name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Sikkerhed: pip-audit slår vores deps op i en database over kendte
      # sårbarheder (PyPI Advisory DB). Hvis der findes en CVE i Flask,
      # numpy eller scikit-learn, fejler bygget her — så vi opdager det
      # FØR koden kommer i production.
      - name: Audit dependencies for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build Docker image
        run: docker build -t voltedge-mvp .
