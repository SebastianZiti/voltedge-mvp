name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish-container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker/GHCR krver at image-navne er i lowercase. github.repository_owner
      # giver "SebastianZiti" med store bogstaver, sa vi hardcoder den
      # lowercase form her. Hvis vi skifter ejer en dag, skal denne linje
      # opdateres.
      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sebastianziti/voltedge-mvp:latest
            ghcr.io/sebastianziti/voltedge-mvp:${{ github.sha }}
