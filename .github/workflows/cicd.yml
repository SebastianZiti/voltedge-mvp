name: CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: CI - test og build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Audit dependencies for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build Docker image
        run: docker build -t voltedge-mvp .

  cd:
    name: CD - publish container
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=VoltEdge MVP - Charging Operations (Flask + SQLite + sklearn + Prometheus/Grafana).
            org.opencontainers.image.licenses=MIT
          annotations: |
            index:org.opencontainers.image.source=https://github.com/${{ github.repository }}
            index:org.opencontainers.image.description=VoltEdge MVP - Charging Operations (Flask + SQLite + sklearn + Prometheus/Grafana).
            index:org.opencontainers.image.licenses=MIT
          tags: |
            ghcr.io/sebastianziti/voltedge-mvp:latest
            ghcr.io/sebastianziti/voltedge-mvp:${{ github.sha }}
